<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #08080a;

    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px; padding: 48px 24px;

  header { text-align: center; }
  h1 { font-size: 18px; font-weight: 500; letter-spacing: .35em; text-transform: uppercase; color: #cfc6ae; }

  .work {
    display: block; width: 380px; max-width: 100%;
    text-decoration: none; color: inherit;
    background: linear-gradient(175deg, #1c1c20, #121215);
    border: 1px solid #2a2a30; border-radius: 12px;
    padding: 14px; transition: transform .25s, border-color .25s;
  }
  .work:hover { transform: translateY(-4px); border-color: #4a4536; }
  .work img { width: 100%; border-radius: 6px; display: block; }
  .work .meta { padding: 14px 4px 6px; }
